function cc(card,exp,today=Date.now()){
  const sD=Math.min(28,Math.max(1,card.statementDay||1));
  const dD=Math.min(28,Math.max(1,card.dueDay||15));
  const n=new Date(today);
  let lc=new Date(n);
  if(n.getDate()>=sD)lc.setDate(sD);else{lc.setMonth(lc.getMonth()-1);lc.setDate(sD)}
  lc.setHours(0,0,0,0);
  let nc=new Date(lc);nc.setMonth(nc.getMonth()+1);
  let du=new Date(lc);du.setDate(dD);
  if(du.getTime()<=lc.getTime())du.setMonth(du.getMonth()+1);
  du.setHours(0,0,0,0);
  const ce=exp.filter(e=>e.cardId===card.id);
  const pc=new Date(lc);pc.setMonth(pc.getMonth()-1);
  const se=ce.filter(e=>e.type!=="card-payment"&&e.date>=pc.getTime()&&e.date<lc.getTime()).reduce((s,e)=>s+e.amount,0);
  const sp=ce.filter(e=>e.type==="card-payment"&&e.date>=pc.getTime()&&e.date<lc.getTime()).reduce((s,e)=>s+e.amount,0);
  const ls=Math.max(0,se-sp);
  const pa=ce.filter(e=>e.type==="card-payment"&&e.date>=lc.getTime()).reduce((s,e)=>s+e.amount,0);
  const ou=Math.max(0,ls-pa);
  const ip=ls>0&&pa>=ls;
  const cs=ce.filter(e=>e.type!=="card-payment"&&e.date>=lc.getTime()&&e.date<nc.getTime()).reduce((s,e)=>s+e.amount,0);
  const du2=Math.ceil((du.getTime()-today)/864e5);
  return{lastClose:lc.getTime(),nextClose:nc.getTime(),dueDate:du.getTime(),lastStmt:ls,paidSinceClose:pa,outstanding:ou,isPaid:ip,currentSpend:cs,daysUntilDue:du2,overdue:!ip&&ou>0&&today>du.getTime()}
}

    o("div",{style:{background:c.sf,borderRadius:14,border:`1px solid ${c.brs}`,padding:18,marginBottom:12},children:o(Fragment,{children:[
      t("div",{style:{fontFamily:F.mo,fontSize:10,color:c.ac,letterSpacing:1,marginBottom:8},children:"✓ EXTRACTED"}),
      o("div",{className:"g g2",style:{gap:12,fontSize:13},children:o(Fragment,{children:[
        t(KV,{label:"Total",value:fm(res.total,data.currency)}),
        t(KV,{label:"Merchant",value:res.merchant||"—"}),
        t(KV,{label:"Category",value:co(res.category).label}),
        t(KV,{label:"Date",value:res.date?new Date(res.date).toLocaleDateString():"Today"})
      ]})})
    ]})}),
    o("div",{className:"g g2",style:{gap:8},children:o(Fragment,{children:[
      t("button",{onClick:()=>{sImg(null);sRes(null)},className:"act98 trt",style:{padding:"12px 0",background:c.sf2,border:`1px solid ${c.brs}`,borderRadius:11,color:c.tx,fontSize:13},children:"Retake"}),
      t("button",{onClick:save,className:"act98 trt",style:{padding:"12px 0",background:c.ac,color:"#0a0a0a",borderRadius:11,fontWeight:600,fontSize:13,border:"none"},children:"Save expense"})
    ]})})
  ]}):null;
  const imageView=o(Fragment,{children:[
    t("img",{src:img,alt:"",style:{width:"100%",borderRadius:16,marginBottom:16}}),
    busy?t("div",{style:{padding:24,textAlign:"center",color:c.td},children:"Extracting…"}):extractedView
  ]});
  return o("div",{style:{padding:"48px 24px 32px"},children:o(Fragment,{children:[
    t(SH,{title:t("em",{children:"Bill scan"}),onBack:onClose}),
    err?t("div",{style:{padding:"10px 14px",background:c.ro+"20",border:`1px solid ${c.ro}40`,borderRadius:11,fontSize:13,color:c.ro,marginBottom:16},children:err}):null,
    t("input",{type:"file",accept:"image/*",capture:"environment",ref:fileRef,onChange:e=>pick(e.target.files?.[0]),style:{display:"none"}}),
    img?imageView:pickerArea
  ]})});
}

// === MOUNT ===
createRoot(document.getElementById("root")).render(t(App,{}));
</script>
</body>
</html>

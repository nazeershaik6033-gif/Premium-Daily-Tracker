    o("div",{className:"g g2",style:{gap:8},children:o(Fragment,{children:[
      t("button",{onClick:()=>{sImg(null);sRes(null)},className:"act98 trt",style:{padding:"12px 0",background:c.sf2,border:`1px solid ${c.brs}`,borderRadius:11,color:c.tx,fontSize:13},children:"Retake"}),

    ]})})

                t("button",{onClick:()=>isBuiltin?startEdit(cat):startCustEdit(cat),style:{width:30,height:30,borderRadius:8,background:c.sf2,border:`1px solid ${c.brs}`,display:"flex",alignItems:"center",justifyContent:"center",color:c.td},children:t(Pencil,{size:13})}),
                t("button",{onClick:()=>sDelId((isBuiltin?"bi:":"cu:")+cat.id),style:{width:30,height:30,borderRadius:8,background:"transparent",border:"none",display:"flex",alignItems:"center",justifyContent:"center",color:c.tm},children:t(X,{size:14})}),
                t("div",{"data-grip":i,style:{padding:"0 4px",color:c.td,cursor:"grab",display:"flex",alignItems:"center",userSelect:"none",touchAction:"none"},children:t(GripV,{size:18})}),
              ]})
            });
          })
        }),
        hiddenBI.length>0&&o("div",{style:{marginBottom:16},children:[
          t("div",{style:{fontFamily:F.mo,fontSize:10,color:c.tm,letterSpacing:1.5,marginBottom:8},children:"HIDDEN ("+hiddenBI.length+")"}),
          t("div",{style:{background:c.sfg,borderRadius:14,border:`1px solid ${c.brs}`,overflow:"hidden"},children:hiddenBI.map((cat,i)=>o("div",{key:cat.id,className:"f ia",style:{gap:12,padding:"12px 16px",opacity:.55,borderBottom:i===hiddenBI.length-1?"none":`1px solid ${c.brs}`},children:[
            t("span",{style:{fontSize:18},children:cat.emoji}),
            t("div",{className:"f1",children:t("div",{style:{fontSize:14},children:cat.label})}),
            t("button",{onClick:()=>restoreBuiltIn(cat.id),style:{padding:"4px 10px",background:c.sf2,border:`1px solid ${c.brs}`,borderRadius:8,fontSize:11,color:c.td,fontFamily:F.mo},children:"RESTORE"}),
          ]}))})
        ]}),
      ]});
    })(),
    delId&&t(CSht,{onClose:()=>sDelId(null),title:delId.startsWith("bi:")?"Hide category?":"Delete category?",subtitle:delId.startsWith("bi:")?"Category hidden from expense forms. Tap RESTORE to bring it back.":"Existing expenses with this category keep their label.",onConfirm:()=>delId.startsWith("bi:")?hideBuiltIn(delId.slice(3)):delCustom(delId.slice(3)),confirmLabel:delId.startsWith("bi:")?"Hide":"Delete"}),
  ]});
}
// === MOUNT ===
createRoot(document.getElementById("root")).render(t(App,{}));

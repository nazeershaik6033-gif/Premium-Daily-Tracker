// === CARD BILL PAYMENT DETECTION ===
// Flags expenses that look like a credit-card bill payment mislogged as a normal
// expense (paid from a bank account), which double-counts: the purchases were
// already counted at swipe time. Returns {match:boolean, cardId:string|null}.
function cardBillGuess(e,cards){
  if(!e||e.type==="card-payment"||e.cardId||e.ccFixIgnore)return{match:false,cardId:null};
  const txt=`${e.merchant||""} ${e.payee||""} ${e.note||""}`.toLowerCase();
  const cc=(cards||[]).filter(x=>x.type==="credit");
  let cardId=null;
  for(const cr of cc){const nm=(cr.name||"").toLowerCase();if(nm&&txt.includes(nm)){cardId=cr.id;break}if(cr.last4&&txt.includes(cr.last4)){cardId=cr.id;break}}

  const billCat=e.category==="bills"&&!!cardId;
  const match=!!cardId||kw||billCat;
  if(match&&!cardId&&cc.length)cardId=cc[0].id;
  return{match,cardId};
}
function isCardBillPayment(e,cards){return cardBillGuess(e,cards).match}

function cc(card,exp,today=Date.now()){
  const sD=Math.min(31,Math.max(1,card.statementDay||1));
  const dD=Math.min(31,Math.max(1,card.dueDay||15));
  const _dim=(y,m)=>new Date(y,m+1,0).getDate();
  const _set=(d2,day)=>{d2.setDate(1);d2.setDate(Math.min(day,_dim(d2.getFullYear(),d2.getMonth())));return d2};
  const _addM=(d2,k,day)=>{d2.setDate(1);d2.setMonth(d2.getMonth()+k);d2.setDate(Math.min(day,_dim(d2.getFullYear(),d2.getMonth())));return d2};
  const n=new Date(today);
  const effSD=Math.min(sD,_dim(n.getFullYear(),n.getMonth()));
  let lc=new Date(n);
  if(n.getDate()>=effSD)_set(lc,sD);else _addM(lc,-1,sD);
  lc.setHours(0,0,0,0);
  let nc=_addM(new Date(lc),1,sD);nc.setHours(0,0,0,0);
  let du=new Date(lc);_set(du,dD);
  if(du.getTime()<=lc.getTime())_addM(du,1,dD);
  du.setHours(0,0,0,0);
  const ce=exp.filter(e=>e.cardId===card.id);
  const pc=_addM(new Date(lc),-1,sD);
  const se=ce.filter(e=>e.type!=="card-payment"&&e.date>=pc.getTime()&&e.date<lc.getTime()).reduce((s,e)=>s+e.amount,0);
  const sp=ce.filter(e=>e.type==="card-payment"&&e.date>=pc.getTime()&&e.date<lc.getTime()).reduce((s,e)=>s+e.amount,0);
  const ls=Math.max(0,se-sp);
  const pa=ce.filter(e=>e.type==="card-payment"&&e.date>=lc.getTime()).reduce((s,e)=>s+e.amount,0);
  const ou=Math.max(0,ls-pa);
  const ip=ls>0&&pa>=ls;
  const cs=ce.filter(e=>e.type!=="card-payment"&&e.date>=lc.getTime()&&e.date<nc.getTime()).reduce((s,e)=>s+e.amount,0);
  const du2=Math.ceil((du.getTime()-today)/864e5);
  return{lastClose:lc.getTime(),nextClose:nc.getTime(),dueDate:du.getTime(),lastStmt:ls,paidSinceClose:pa,outstanding:ou,isPaid:ip,currentSpend:cs,daysUntilDue:du2,overdue:!ip&&ou>0&&today>du.getTime()}
}

// === STATEMENT ANALYZER ===
function StmtAnalyze({data,onClose}){
  const{expenses,currency}=data;
  const[file,sFile]=useState(null);
  const[parsed,sParsed]=useState(null);
  const[analyzing,sAnalyzing]=useState(false);
  const[result,sResult]=useState(null);
  const[err,sErr]=useState(null);
  const[period,sPeriod]=useState(3);
  const fileRef=useRef(null);
  const parseFile=async(f)=>{
    sErr(null);sResult(null);
    try{
      const buf=await f.arrayBuffer();
      const XLSXLib=window.XLSX||XLSX;
      const wb=XLSXLib.read(buf);
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSXLib.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
      if(rows.length<2){sErr("No data found in file");return}
      const headers=rows[0].map(h=>String(h||"").toLowerCase().trim());
      const fi=names=>names.map(n=>headers.findIndex(h=>h.includes(n))).find(i=>i>=0)??-1;
      const aI=fi(["amount","amt","debit","credit","dr","cr"]);
      const dI=fi(["date","txn date","transaction date","value date","posting date"]);
      const mI=fi(["merchant","description","desc","narration","particulars","details","name","transaction","remarks"]);
      if(aI<0||dI<0){sErr("Could not detect Date or Amount columns. Found headers: "+headers.join(", "));return}
      const txns=[];
      for(let i=1;i<rows.length;i++){
        const row=rows[i];if(!row||row.every(x=>!x))continue;
        const rawAmt=String(row[aI]||"").replace(/[^0-9.]/g,"");
        const amt=parseFloat(rawAmt);if(!amt||isNaN(amt)||amt<=0)continue;
        const rawDate=String(row[dI]||"");let ts=0;
        if(rawDate){const pd=new Date(rawDate);if(!isNaN(pd.getTime()))ts=pd.getTime()}
        if(!ts)continue;
        const merchant=mI>=0?String(row[mI]||"").trim().slice(0,60):"";
        txns.push({date:ts,amount:amt,merchant:merchant||"Unknown"});
      }
      if(!txns.length){sErr("No valid transactions found. Check that Date and Amount columns have data.");return}
      txns.sort((a,b)=>b.date-a.date);sParsed(txns);sFile(f);
    }catch(e2){sErr("Parse error: "+e2.message)}
  };

    if(!parsed||!parsed.length)return;
    if(!gAK()){sErr("Add an AI API key in Settings first.");return}
    sAnalyzing(true);sErr(null);
    try{
      const cutoff=Date.now()-period*30*864e5;
      const appExps=expenses.filter(e=>e.type==="expense"&&e.date>=cutoff).map(e=>({date:new Date(e.date).toLocaleDateString("en-CA"),amount:e.amount,merchant:e.merchant||e.payee||(co(e.category)||{}).label||"Unknown"}));

// === FINANCIAL HEALTH / TIPS ===
function Tips({data,onClose}){
  const{expenses,currency,monthStartDay,financeProfile,recurring}=data;
  const fp=financeProfile||{};
  const mst=useMemo(()=>{const d2=new Date();return new Date(d2.getFullYear(),d2.getMonth(),monthStartDay||1).getTime()},[monthStartDay]);
  const monExp=useMemo(()=>expenses.filter(e=>e.date>=mst&&e.type==="expense"),[expenses,mst]);
  const monInc=useMemo(()=>expenses.filter(e=>e.date>=mst&&e.type==="income"),[expenses,mst]);
  const tExp=monExp.reduce((s,e)=>s+e.amount,0);
  const tInc=monInc.reduce((s,e)=>s+e.amount,0)||fp.monthlyIncome||1;
  const net=tInc-tExp;
  const savingsRate=tInc>0?((net/tInc)*100):0;
  const essentialIds=["food","groceries","milk_curd","eggs","transport","bills","health","household_sam"];
  const essAmt=monExp.filter(e=>essentialIds.includes(e.category)).reduce((s,e)=>s+e.amount,0);
  const discIds=["entertainment","shopping","apparel_online","apparel_offline","online_purchases"];
  const discAmt=monExp.filter(e=>discIds.includes(e.category)).reduce((s,e)=>s+e.amount,0);
  const subAmt=monExp.filter(e=>e.category==="subscriptions").reduce((s,e)=>s+e.amount,0);
  const essRatio=tInc>0?(essAmt/tInc)*100:0;
  const discRatio=tInc>0?(discAmt/tInc)*100:0;
  const subRatio=tInc>0?(subAmt/tInc)*100:0;
  const efMonths=fp.emergencyFundMonths||6;
  const totalDebt=fp.totalDebt||0;
  const dtiRatio=tInc>0?(totalDebt/(tInc*12))*100:null;
  const goal=fp.savingsGoalPct||20;
  const metrics=[
    {label:"Savings Rate",value:savingsRate,target:goal,good:savingsRate>=goal,unit:"%",desc:`Target ≥${goal}%`,current:savingsRate.toFixed(1)+"%"},
    {label:"Essentials Ratio",value:essRatio,target:50,good:essRatio<=50,unit:"%",desc:"Target ≤50% (needs)",current:essRatio.toFixed(1)+"%"},
    {label:"Discretionary",value:discRatio,target:30,good:discRatio<=30,unit:"%",desc:"Target ≤30% (wants)",current:discRatio.toFixed(1)+"%"},
    {label:"Subscription Drag",value:subRatio,target:10,good:subRatio<=10,unit:"%",desc:"Target ≤10%",current:subRatio.toFixed(1)+"%"},
    dtiRatio!=null?{label:"Debt-to-Income",value:dtiRatio,target:20,good:dtiRatio<=20,unit:"%",desc:"Total debt vs annual income",current:dtiRatio.toFixed(1)+"%"}:null,
  ].filter(Boolean);
  const score=metrics.filter(m=>m.good).length;
  const scoreColor=score>=4?c.mt:score>=2?c.gd:c.co;
  const badges=["⚠️ Needs Attention","📊 Getting There","✅ On Track","💪 Healthy","🌟 Excellent!"];
  const badge=badges[Math.min(score,4)];
  return o("div",{style:{padding:"8px 24px 32px"},className:"st",children:[
    t(SH,{title:t("em",{children:"Financial Health"}),onBack:onClose}),
    o("div",{style:{background:c.sfg,borderRadius:18,border:`1px solid ${c.brs}`,padding:18,marginBottom:16,textAlign:"center"},children:[
      t("div",{style:{fontFamily:F.mo,fontSize:10,color:c.tm,letterSpacing:1.5,marginBottom:8},children:"HEALTH SCORE"}),
      t("div",{style:{fontFamily:'var(--nf)',fontSize:64,fontWeight:300,color:scoreColor,lineHeight:1},children:score+"/"+metrics.length}),
      t("div",{style:{fontSize:14,color:c.td,marginTop:8},children:badge}),
    ]}),
    o("div",{style:{background:c.sfg,borderRadius:18,border:`1px solid ${c.brs}`,padding:18,marginBottom:16},children:[
      t("div",{style:{fontFamily:F.mo,fontSize:10,color:c.tm,letterSpacing:1.5,marginBottom:14},children:"THIS MONTH"}),
      o("div",{className:"g g3",style:{gap:12},children:[
        o("div",{style:{textAlign:"center"},children:[t("div",{style:{fontFamily:F.mo,fontSize:9,color:c.tm,letterSpacing:1},children:"INCOME"}),t("div",{style:{fontFamily:'var(--nf)',fontSize:22,color:c.mt,marginTop:4},children:fm(tInc,currency)})]}),
        o("div",{style:{textAlign:"center"},children:[t("div",{style:{fontFamily:F.mo,fontSize:9,color:c.tm,letterSpacing:1},children:"EXPENSES"}),t("div",{style:{fontFamily:'var(--nf)',fontSize:22,color:c.co,marginTop:4},children:fm(tExp,currency)})]}),
        o("div",{style:{textAlign:"center"},children:[t("div",{style:{fontFamily:F.mo,fontSize:9,color:c.tm,letterSpacing:1},children:"NET"}),t("div",{style:{fontFamily:'var(--nf)',fontSize:22,color:net>=0?c.mt:c.co,marginTop:4},children:fm(net,currency)})]}),
      ]}),
    ]}),
    o("div",{style:{background:c.sfg,borderRadius:18,border:`1px solid ${c.brs}`,padding:18,marginBottom:16},children:[
      t("div",{style:{fontFamily:F.mo,fontSize:10,color:c.tm,letterSpacing:1.5,marginBottom:14},children:"METRICS"}),
      o("div",{style:{display:"flex",flexDirection:"column",gap:14},children:metrics.map(m=>o("div",{key:m.label,children:[
        o("div",{className:"f ia jb",style:{marginBottom:6},children:[
          o("div",{children:[t("div",{style:{fontSize:13,fontWeight:500},children:m.label}),t("div",{style:{fontSize:11,color:c.tm},children:m.desc})]}),
          o("div",{style:{textAlign:"right"},children:[
            t("div",{style:{fontFamily:F.mo,fontSize:14,color:m.good?c.mt:m.value>m.target*1.5?c.co:c.gd},children:m.current}),
            t("div",{style:{fontSize:10,color:m.good?c.mt:c.co,fontFamily:F.mo,letterSpacing:.5},children:m.good?"HEALTHY":"WATCH"}),
          ]}),
        ]}),
        t("div",{style:{height:4,background:c.sf2,borderRadius:999},children:t("div",{style:{width:Math.min(100,(m.value/Math.max(m.target*2,m.value+1))*100)+"%",height:"100%",background:m.good?c.mt:m.value>m.target*1.5?c.co:c.gd,borderRadius:999,transition:"width 600ms"}})}),
      ]}))}),
    ]}),
    tInc>0&&o("div",{style:{background:c.sfg,borderRadius:18,border:`1px solid ${c.brs}`,padding:18,marginBottom:16},children:[
      t("div",{style:{fontFamily:F.mo,fontSize:10,color:c.tm,letterSpacing:1.5,marginBottom:12},children:"50/30/20 RULE"}),
      t("div",{style:{fontSize:11,color:c.tm,marginBottom:12},children:"Needs ≤50% · Wants ≤30% · Save ≥20%"}),
      [["Needs",essRatio,50,c.ac],["Wants",discRatio,30,c.gd],["Savings",savingsRate,20,c.mt]].map(([label,ratio,target,col])=>o("div",{key:label,style:{marginBottom:10},children:[
        o("div",{className:"f jb",style:{fontSize:12,marginBottom:4},children:[t("span",{children:label}),o("span",{style:{fontFamily:F.mo,color:c.td},children:[ratio.toFixed(1),"% of income"]})]  }),
        o("div",{style:{height:6,background:c.sf2,borderRadius:999,overflow:"hidden"},children:[
          t("div",{style:{width:Math.min(100,ratio)+"%",height:"100%",background:ratio<=(target*0.9)?col:ratio<=target?col+"cc":c.co,borderRadius:999,transition:"width 600ms"}}),
        ]}),
        t("div",{style:{fontSize:10,color:c.tm,marginTop:2,fontFamily:F.mo},children:"target: "+target+"%"}),
      ]})),
    ]}),
    !fp.monthlyIncome&&t("div",{style:{background:c.sf2,borderRadius:12,padding:"12px 14px",border:`1px solid ${c.brs}`,fontSize:12,color:c.tm},children:"💡 Add your monthly income in Settings → Finance Profile for more accurate scores."}),
  ]});
}
